name: Dev Environment

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  dev-test:
    runs-on: ubuntu-latest
    environment: development
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install Playwright browsers
      run: |
        python -m playwright install chromium --with-deps
    - name: Run extended tests
      run: |
        python -m pytest tests/ -v --tb=short --cov=vara_ai_eval --cov-report=xml
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
    - name: Run deterministic checks
      run: |
        # Run multiple times to check determinism
        for i in {1..3}; do
          python -c "import sys; sys.path.insert(0, '.'); from vara_ai_eval.cli.runner import main; main(['--json-output', '--seed', '42'])" > output_$i.json
        done
        # Check if outputs are identical
        if diff output_1.json output_2.json && diff output_2.json output_3.json; then
          echo "Deterministic: PASS"
        else
          echo "Deterministic: FAIL"
          exit 1
        fi