<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple LLM App Demo</title>
</head>
<body>
    <h1>LLM Query Demo</h1>
    <form id="query-form">
        <label for="query">Ask a question:</label>
        <input type="text" name="query" id="query" required>
        <button type="submit">Submit</button>
    </form>
    <div id="response" style="margin-top: 20px; border: 1px solid #ccc; padding: 10px;"></div>

    <script>
        document.getElementById('query-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const query = document.getElementById('query').value;
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = 'Processing...';

            // Simulate LLM response (replace with real API call)
            setTimeout(() => {
                responseDiv.textContent = `AI Response: ${query} is a great question! Artificial Intelligence refers to machines performing tasks that typically require human intelligence.`;
            }, 1000);
        });
    </script>
</body>
</html>
